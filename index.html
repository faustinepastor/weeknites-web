<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weeknites — Meal planning for real life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #4A7C59;
      --green-dark:   #3a6145;
      --orange:       #E8954A;
      --bg:           #FAFAF7;
      --text:         #1A1914;
      --muted:        #8B8070;
      --surface:      #F2EDE3;
      --border:       #E5DDD0;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 4rem;
      position: relative;
    }

    /* subtle warm glow */
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 25%, rgba(74,124,89,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* icon */
    .icon-wrap {
      width: 112px;
      height: 112px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 2px 20px rgba(26,25,20,0.12), 0 0 0 1px rgba(26,25,20,0.05);
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .icon-wrap img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* wordmark */
    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.8rem, 9vw, 4.2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* tagline */
    .tagline {
      margin-top: 1rem;
      font-size: clamp(0.95rem, 2.8vw, 1.1rem);
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    /* rule */
    .rule {
      width: 36px;
      height: 2px;
      background: var(--orange);
      border-radius: 2px;
      margin: 1.75rem auto;
      position: relative;
      z-index: 1;
    }

    /* App Store button */
    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      padding: 13px 22px;
      position: relative;
      z-index: 1;
      transition: background 0.18s, transform 0.14s;
      box-shadow: 0 2px 14px rgba(74,124,89,0.28);
    }

    .store-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
    .store-btn:active { transform: translateY(0); }

    .store-btn svg { width: 24px; height: 24px; flex-shrink: 0; }

    .store-btn-text { display: flex; flex-direction: column; line-height: 1.2; }
    .store-btn-text .sub {
      font-size: 0.6rem; font-weight: 400;
      letter-spacing: 0.07em; text-transform: uppercase; opacity: 0.82;
    }
    .store-btn-text .main { font-size: 1rem; font-weight: 500; letter-spacing: -0.01em; }

    /* footer */
    .footer {
      position: absolute;
      bottom: 1.4rem;
      font-size: 0.72rem;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 0.03em;
    }

    @media (prefers-reduced-motion: no-preference) {
      .icon-wrap { animation: float 4.5s ease-in-out infinite; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-7px); }
      }
    }
  </style>
</head>
